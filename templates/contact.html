{% extends "layout.html" %}

{% block title %}Contact - PlantCare AI{% endblock %}

{% block content %}
<div style="display: flex; justify-content: center; padding: 40px 20px;">
    <div class="glass-container" style="max-width: 600px;">
        <div style="text-align: center; margin-bottom: 30px;">
            <i class="ph-fill ph-envelope-simple" style="font-size: 3rem; color: var(--accent-primary);"></i>
            <h2>Contact Us</h2>
            <p>Have questions or feedback? We'd love to hear from you.</p>
        </div>
        
        <form action="#" method="POST" onsubmit="event.preventDefault(); alert('Message sent successfully!');">
            <div class="form-group">
                <label for="name">Your Name</label>
                <input type="text" id="name" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label for="email">Your Email</label>
                <input type="email" id="email" class="form-control" required>
            </div>

            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" class="form-control" rows="5" required></textarea>
            </div>

            <button type="submit" class="btn" style="width: 100%;">Send Message</button>
        </form>
    </div>
</div>
{% endblock %}
