{% extends "layout.html" %}

{% block title %}Sign Up - PlantCare AI{% endblock %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 80vh; padding: 20px;">
    <div class="glass-container" style="max-width: 450px;">
        <div style="text-align: center; margin-bottom: 30px;">
            <i class="ph-fill ph-user-plus" style="font-size: 3rem; color: var(--accent-primary);"></i>
            <h2 style="margin-top: 10px; margin-bottom: 5px;">Create Account</h2>
            <p style="font-size: 0.95rem;">Join PlantCare AI to protect your crops.</p>
        </div>

        <form action="/signup" method="POST">
            <div class="form-group">
                <label for="name">Username</label>
                <input type="text" id="name" name="name" class="form-control" required placeholder="Choose a username">
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" required placeholder="Enter your email">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" required placeholder="Create a strong password">
                <small style="color: var(--text-muted); font-size: 0.8rem; display: block; margin-top: 8px;">
                    Must be 8+ characters, include 1 uppercase, 1 number, and 1 special character (!@#$%^&*).
                </small>
            </div>

            <button type="submit" class="btn" style="width: 100%; margin-top: 10px;">Sign Up</button>
        </form>

        <div style="text-align: center; margin-top: 24px;">
            <p style="font-size: 0.9rem; margin-bottom: 0;">Already have an account? <a href="{{ url_for('login') }}" style="color: var(--accent-primary); text-decoration: none; font-weight: 600;">Log In</a></p>
        </div>
    </div>
</div>
{% endblock %}
