<!DOCTYPE html>
<html>
<head>
    <title>Sign Up</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-image: url('/static/home1.jpg'); /* Replace with your image path */
            background-size: cover;
            background-position: center;
        }
        .signup-container {
            border: 2px solid #000;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            background-color: rgba(255, 255, 255, 0.8); /* Semi-transparent white background */
            width: 300px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        input[type="text"], input[type="email"], input[type="password"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: none;
            border-radius: 5px;
            color: #fff;
            background-color: #000;
            cursor: pointer;
        }
        button:hover {
            background-color: #333;
        }
        .login-link {
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="signup-container">
        <h2>Sign Up</h2>
        <form method="POST" action="">
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <script>
                        {% for message in messages %}
                            {% if "Account created" in message %}
                                alert("Account created successfully!");
                            {% elif "Username already exists" in message %}
                                alert("Username already exists!");
                            {% elif "Password must" in message %}
                                alert("Password must meet security requirements!");
                            {% endif %}
                        {% endfor %}
                    </script>
                {% endif %}
            {% endwith %}
            <div class="form-group">
                <input type="text" name="name" placeholder="Username" required>
            </div>
            <div class="form-group">
                <input type="email" name="email" placeholder="Email ID" required>
            </div>
            <div class="form-group">
                <input type="password" name="password" placeholder="Password" required>
            </div>
            <button type="submit">Create Account</button>
            <button type="reset">Reset</button>
            <div class="login-link">
                Already have an account? <a href="{{ url_for('login') }}">Login</a>
            </div>
        </form>
    </div>
</body>
</html>
